<!doctype html>
<html lang="en" class="no-js">
  <head>
    <!-- Charset and Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Swap no-js -> js so the reveal animation runs for JS users, while no-JS
         visitors (and basic crawlers) keep the prerendered content fully visible. -->
    <script>
      document.documentElement.classList.remove('no-js');
      try {
        const saved = localStorage.getItem('privoraa-theme') || 'system';
        const dark = saved === 'dark' || (saved === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(dark ? 'dark' : 'light');
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      } catch { /* use the light CSS default */ }
    </script>

    <!-- Favicon and Icons -->
    <link rel="icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f7f7f5" />

    <!-- Primary Meta Tags -->
    <title>Vedix — Your Private AI Companion</title>
    <meta name="description" content="Vedix is a private AI companion that helps you focus, remember, and feel safe — your conversations stay sealed in a vault only you can open." />
    <meta name="author" content="Shivansh Tiwari" />
    <meta name="keywords" content="Vedix, private AI, AI companion, privacy-first AI, AI workspace, sealed vault" />
    <link rel="canonical" href="https://vedix.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vedix.vercel.app/" />
    <meta property="og:title" content="Vedix — Your Private AI Companion" />
    <meta property="og:description" content="Built to help you focus, remember, and feel safe. Your AI, sealed with a key only you hold." />
    <meta property="og:image" content="https://vedix.vercel.app/logo.png" />

    <!-- Twitter Meta -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vedix.vercel.app/" />
    <meta name="twitter:title" content="Vedix — Your Private AI Companion" />
    <meta name="twitter:description" content="Built to help you focus, remember, and feel safe. Your AI, sealed with a key only you hold." />
    <meta name="twitter:image" content="https://vedix.vercel.app/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Structured Data (Correct Placement) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Vedix",
        "url": "https://vedix.vercel.app/",
        "applicationCategory": "AI Assistant",
        "operatingSystem": "All",
        "description": "Vedix is a private AI companion that helps you focus, remember, and feel safe — conversations sealed in a vault only you can open.",
        "image": "https://vedix.vercel.app/logo.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width:42rem;margin:4rem auto;padding:0 1.5rem;font-family:system-ui,sans-serif;color:#e5e7eb;text-align:center">
        <h1 style="font-size:1.5rem;font-weight:700">Vedix — your private AI companion</h1>
        <p style="margin-top:.75rem;color:#9ca3af">
          Vedix runs best with JavaScript enabled. The full app — private chat across cloud and
          on-device models, with your conversations sealed in a vault only you can open — needs it on.
          Please enable JavaScript, then reload.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
