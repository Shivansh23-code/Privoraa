# ---------------------------------------------------------------------------
# "prod" profile — a managed SQL database, no Redis. Persistent cloud deploy.
# Set on the host:  SPRING_PROFILES_ACTIVE=prod
#                   DB_URL, DB_USER, DB_PASS  (from your managed DB)
#                   OPENROUTER_API_KEY, JWT_SECRET, CORS_ORIGINS
# Works with ANY SQL database — point DB_URL at managed MySQL OR Postgres:
#   MySQL:    jdbc:mysql://host:3306/privoraa?useSSL=true&serverTimezone=UTC
#   Postgres: jdbc:postgresql://host:5432/privoraa   (e.g. Render's free Postgres)
# Unlike the h2 profile, data persists across restarts/cold-starts.
# ---------------------------------------------------------------------------

server.port=${PORT:8099}

# Full JDBC URL from your provider. The driver is auto-detected from the URL
# scheme (mysql / postgresql), so no driver-class-name is pinned here.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Hibernate builds/updates the schema, so the same code works on MySQL or
# Postgres without dialect-specific migrations. Flyway (MySQL-only migrations)
# is disabled for this profile.
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Cloud has no local Ollama — default this deploy to OpenRouter. Set
# OPENROUTER_API_KEY (and optionally override LLM_PROVIDER) as host env vars.
# Local/dev builds keep defaulting to ollama for the private/offline experience.
privoraa.llm.provider=${LLM_PROVIDER:openrouter}

# No Redis in this deploy: in-memory cache + Redis health probe disabled
# (the rate limiter already fails open).
spring.cache.type=simple
management.health.redis.enabled=false
