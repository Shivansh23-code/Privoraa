# ---------------------------------------------------------------------------
# "prod" profile — managed MySQL, no Redis. For a persistent cloud deploy.
# Set on the host:  SPRING_PROFILES_ACTIVE=prod
#                   DB_URL, DB_USER, DB_PASS  (from your managed MySQL)
#                   OPENROUTER_API_KEY, JWT_SECRET, CORS_ORIGINS
# Unlike the h2 profile, data persists across restarts/cold-starts.
# ---------------------------------------------------------------------------

server.port=${PORT:8099}

# Managed MySQL (full JDBC URL from your provider, incl. its SSL params).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway owns the schema (inherited: spring.flyway.enabled=true, ddl-auto=none).

# Cloud has no local Ollama — default this deploy to OpenRouter. Set
# OPENROUTER_API_KEY (and optionally override LLM_PROVIDER) as host env vars.
# Local/dev builds keep defaulting to ollama for the private/offline experience.
privoraa.llm.provider=${LLM_PROVIDER:openrouter}

# No Redis in this deploy: in-memory cache + Redis health probe disabled
# (the rate limiter already fails open).
spring.cache.type=simple
management.health.redis.enabled=false
