# Zero-setup dev profile: in-memory H2, no MySQL, no Flyway, no Redis.
# Nothing to install — just Java. Data is wiped on restart.
# Run with:  mvnw spring-boot:run "-Dspring-boot.run.profiles=h2"
#       or:  java -jar target/privoraa-backend-2.0.0.jar --spring.profiles.active=h2

server.port=8099

# In-memory H2 in MySQL-compatibility mode; Hibernate builds the schema.
spring.datasource.url=jdbc:h2:mem:privoraa;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# Flyway migrations are MySQL-targeted; let Hibernate own the schema on H2 instead.
spring.flyway.enabled=false

# In-memory cache + no Redis health probe.
spring.cache.type=simple
management.health.redis.enabled=false

# H2 web console at /h2-console (handy for debugging).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
