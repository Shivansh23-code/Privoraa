# Cloud hosts (Render/Railway/Fly) inject the port via $PORT; default to 8099 locally.
server.port=${PORT:8099}
spring.application.name=privoraa

# When no profile is explicitly active (e.g. running from IntelliJ or `mvnw
# spring-boot:run`), default to "local": local MySQL, no Redis, secrets loaded
# from .env. Docker/prod set SPRING_PROFILES_ACTIVE explicitly to opt out and use
# the Redis-backed configuration in this file.
spring.profiles.default=local

# Both spring-web (MVC, for SseEmitter) and spring-webflux (WebClient) are on the
# classpath; pin the app to the servlet stack so MVC + SSE drive the API.
spring.main.web-application-type=servlet

# ----- Datasource (MySQL by default) -----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/privoraa?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# Flyway owns the schema; Hibernate only maps to it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ----- Redis (cache + rate limiting) -----
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.cache.type=${CACHE_TYPE:redis}

# ----- File upload (RAG documents) -----
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ----- App config -----
privoraa.jwt.secret=${JWT_SECRET:dev-only-change-me-please-this-must-be-at-least-32-bytes-long-secret}
privoraa.jwt.access-ttl-min=${JWT_ACCESS_TTL_MIN:15}
privoraa.jwt.refresh-ttl-days=${JWT_REFRESH_TTL_DAYS:7}
privoraa.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,https://privoraaai.vercel.app,https://privoraa.vercel.app}

privoraa.openrouter.api-key=${OPENROUTER_API_KEY:}
privoraa.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
privoraa.openrouter.app-url=${APP_PUBLIC_URL:https://privoraa.vercel.app}
privoraa.openrouter.app-title=${APP_TITLE:Privoraa}
privoraa.openrouter.embedding-model=${EMBEDDING_MODEL:}
privoraa.openrouter.models-cache-ttl-min=60

# ----- Gemini (Google AI Studio, OpenAI-compatible) -----
# A free, much stronger CODING backend than the OpenRouter free tier. Get a free
# key at https://aistudio.google.com/apikey and set GEMINI_API_KEY; coding
# requests on "auto" then route here automatically. Inert (no behavior change)
# until the key is set.
privoraa.gemini.api-key=${GEMINI_API_KEY:}
privoraa.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
privoraa.gemini.code-model=${GEMINI_CODE_MODEL:gemini-2.0-flash}
privoraa.gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}

privoraa.ratelimit.requests-per-min=${RATE_LIMIT_PER_MIN:20}
privoraa.ratelimit.requests-per-day=${RATE_LIMIT_PER_DAY:200}

# ----- Access control -----
# ACCESS_ALLOWLIST: comma-separated emails allowed to sign up / log in. Empty =
#   open (dev). Set it in prod to lock the app (and your OpenRouter quota) to you.
# ACCESS_PRO_EMAILS: emails auto-granted PRO on every login, so the owner never
#   re-pays after the in-memory DB resets.
# ----- Chat output token budgets per category -----
privoraa.chat.output.fast-max-tokens=${CHAT_OUTPUT_FAST_MAX_TOKENS:2048}
privoraa.chat.output.general-max-tokens=${CHAT_OUTPUT_GENERAL_MAX_TOKENS:4096}
privoraa.chat.output.learning-max-tokens=${CHAT_OUTPUT_LEARNING_MAX_TOKENS:6144}
privoraa.chat.output.code-max-tokens=${CHAT_OUTPUT_CODE_MAX_TOKENS:8192}
privoraa.chat.output.reasoning-max-tokens=${CHAT_OUTPUT_REASONING_MAX_TOKENS:6144}
privoraa.chat.output.document-max-tokens=${CHAT_OUTPUT_DOCUMENT_MAX_TOKENS:6144}
privoraa.chat.output.vision-max-tokens=${CHAT_OUTPUT_VISION_MAX_TOKENS:4096}
privoraa.chat.output.unknown-model-max-tokens=${CHAT_OUTPUT_UNKNOWN_MODEL_MAX_TOKENS:4096}
privoraa.chat.output.safety-margin=${CHAT_OUTPUT_SAFETY_MARGIN:512}

privoraa.access.allowlist=${ACCESS_ALLOWLIST:}
# The owner is always PRO (overridable via env). Keeps the PRO UI even after the
# in-memory store resets, with no manual step.
privoraa.access.pro-emails=${ACCESS_PRO_EMAILS:shivanshtiwari887@gmail.com}

# ----- Billing (Razorpay). Inert until KEY_ID/KEY_SECRET are set. -----
# Amounts are in the smallest currency unit (paise for INR); 0 = free beta
# (plan granted without a charge). Set amounts > 0 to charge via Razorpay.
privoraa.billing.key-id=${RAZORPAY_KEY_ID:}
privoraa.billing.key-secret=${RAZORPAY_KEY_SECRET:}
privoraa.billing.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
privoraa.billing.currency=${BILLING_CURRENCY:INR}
privoraa.billing.plus-amount=${BILLING_PLUS_AMOUNT:0}
privoraa.billing.pro-amount=${BILLING_PRO_AMOUNT:0}

privoraa.rag.top-k=4
privoraa.rag.chunk-size=1200
privoraa.rag.chunk-overlap=150
privoraa.rag.embedding-dim=512
# Embedding backend, independent of the chat provider: auto|ollama|openrouter|local.
# 'auto' uses Ollama when active, else OpenRouter-if-configured, else the built-in
# local lexical encoder (zero external dependency — the right default for cloud).
privoraa.rag.embedding-provider=${RAG_EMBEDDING_PROVIDER:auto}

# ----- LLM provider selection (ollama = local/offline, openrouter = cloud) -----
privoraa.llm.provider=${LLM_PROVIDER:ollama}

# ----- Ollama (local). In Docker, set OLLAMA_BASE_URL=http://host.docker.internal:11434 -----
privoraa.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
privoraa.ollama.chat-model=${OLLAMA_MODEL:llama3.2:3b}
privoraa.ollama.embed-model=${OLLAMA_EMBED_MODEL:nomic-embed-text}
privoraa.ollama.keep-alive=${OLLAMA_KEEP_ALIVE:60s}
privoraa.ollama.num-ctx=${OLLAMA_NUM_CTX:4096}
privoraa.ollama.timeout-seconds=300

# ----- Spring AI (semantic RAG embeddings via Ollama) -----
# A provider-agnostic EmbeddingModel; EmbeddingService routes through it when the
# embedding provider resolves to "springai" (or "auto" with Ollama reachable).
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBED_MODEL:nomic-embed-text}
# Never block startup pulling models — the cloud deploy has no Ollama; it falls
# back to the built-in encoder, and local dev pulls models itself.
spring.ai.ollama.init.pull-model-strategy=never

# ----- Local hardware budget (used by the model catalog 'fits this machine' flag) -----
privoraa.hardware.ram-budget-gb=${RAM_BUDGET_GB:8}
privoraa.ai.registry.enabled=${MODEL_REGISTRY_ENABLED:true}
privoraa.ai.registry.refresh-interval=${MODEL_REGISTRY_REFRESH_INTERVAL:PT1H}
privoraa.ai.registry.refresh-timeout=${MODEL_REGISTRY_REFRESH_TIMEOUT:PT10S}
privoraa.ai.registry.max-metadata-entries=${MODEL_REGISTRY_MAX_METADATA_ENTRIES:20}
privoraa.ai.registry.include-paid=${MODEL_REGISTRY_INCLUDE_PAID:false}
privoraa.ai.registry.routing-enabled=${MODEL_REGISTRY_ROUTING_ENABLED:false}
privoraa.ai.registry.dry-run=${MODEL_REGISTRY_DRY_RUN:true}

# ----- Self-hosted GGUF downloads (plan-gated). provider=none|public|s3 -----
# none   = downloads disabled (default; endpoint returns a clean 503)
# public = files behind a CDN / R2 custom domain (set DOWNLOAD_PUBLIC_BASE_URL)
# s3     = private bucket, presigned URLs (set endpoint/bucket/keys; R2 region=auto)
privoraa.downloads.provider=${DOWNLOAD_PROVIDER:none}
privoraa.downloads.public-base-url=${DOWNLOAD_PUBLIC_BASE_URL:}
privoraa.downloads.endpoint=${DOWNLOAD_S3_ENDPOINT:}
privoraa.downloads.region=${DOWNLOAD_S3_REGION:auto}
privoraa.downloads.bucket=${DOWNLOAD_S3_BUCKET:}
privoraa.downloads.access-key=${DOWNLOAD_S3_ACCESS_KEY:}
privoraa.downloads.secret-key=${DOWNLOAD_S3_SECRET_KEY:}
privoraa.downloads.url-ttl-seconds=${DOWNLOAD_URL_TTL:900}

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# ----- Swagger / OpenAPI -----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ----- Resilience4j (OpenRouter upstream) -----
resilience4j.retry.instances.openrouter.max-attempts=3
resilience4j.retry.instances.openrouter.wait-duration=400ms
resilience4j.retry.instances.openrouter.enable-exponential-backoff=true
resilience4j.retry.instances.openrouter.exponential-backoff-multiplier=2

# Quieter web logs
logging.level.org.springframework.web=INFO
logging.level.com.privoraa=INFO
