# ---------------------------------------------------------------------------
# "local" profile — run against your locally-installed MySQL, no Redis needed.
# Start with:  mvnw spring-boot:run "-Dspring-boot.run.profiles=local"
#        or:   java -jar target/privoraa-backend-2.0.0.jar --spring.profiles.active=local
#
# The datasource URL is set explicitly here (not via ${DB_URL}) so a stray
# DB_URL environment variable on the machine can't redirect us to the wrong DB.
# ---------------------------------------------------------------------------

server.port=8099

# Pull secrets (DB_PASS, OPENROUTER_API_KEY, JWT_SECRET, …) from the gitignored
# .env in the project root, so running from IntelliJ "just works" without setting
# environment variables by hand. `optional:` = no error if .env is absent.
spring.config.import=optional:file:.env[.properties]

# ----- Local MySQL (Flyway builds the schema on first run) -----
spring.datasource.url=jdbc:mysql://localhost:3306/privoraa?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- No Redis locally: in-memory cache + Redis health probe disabled -----
spring.cache.type=simple
management.health.redis.enabled=false
