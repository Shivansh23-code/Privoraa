services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: privoraa
    ports:
      # Host 3307 -> container 3306 (host 3306 is used by a local mysqld).
      # The api reaches MySQL via the internal network as mysql:3306 regardless.
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Opt out of the "local" default profile; use the Redis-backed prod config.
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/privoraa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASS: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-this-must-be-at-least-32-bytes-long-secret}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      # Local LLM. The container can't see the host's localhost, so reach Ollama
      # via host.docker.internal. The host must run Ollama with OLLAMA_HOST=0.0.0.0.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    extra_hosts:
      # Make host.docker.internal resolve to the host gateway (portable across OSes).
      - "host.docker.internal:host-gateway"
    ports:
      - "8099:8099"

volumes:
  mysql_data:
