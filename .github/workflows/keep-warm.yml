name: Keep backend warm

# Render's free tier spins the instance down after ~15 min of inactivity, which
# makes the next request take 50s+. Pinging the health endpoint on a schedule
# keeps it awake (well within the free 750 instance-hours/month for one service).
#
# Note: GitHub's scheduled runs are best-effort and can be delayed under load.
# For rock-solid keep-warm, also add an UptimeRobot/cron-job.org monitor (5-min).

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          # --max-time 90 so a cold-start wake-up (which the ping itself triggers)
          # has time to complete instead of being treated as a failure.
          curl -fsS --max-time 90 https://privoraa-backend.onrender.com/actuator/health \
            && echo "backend is awake" \
            || echo "ping failed (instance may still be waking) — non-fatal"
